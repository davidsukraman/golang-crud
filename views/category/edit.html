  </head>

        <a class="navbar-brand text-light" href="/">DB TOKO</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavDropdown">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link action text-light" aria-current="page" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link action text-light" href="/products">Products</a>
            </li>
            <li class="nav-item">
              <a class="nav-link action text-light" href="/categories">Categories</a>
            </li>

     <div class="container mt-3">
      <div class="row d-flex justify-content-center">
        <div class="col-4">
            <h1>Edit Category</h1>
            <hr>
            <form action="/categories/edit" method="POST">
                <input type="hidden" name="id" value="{{.category.Id}}">
            <div class="mb-3">
              <label  class="form-label">Name</label> 
              <input type="text" class="form-control" name="name" autocomplete="off" value ="{{.category.Name}}">
            </div>
            <div class="float-end">
              <a href="/categories" class="btn btn-secondary">Back</a>
              <button type="submit" class="btn btn-primary">Save</button>
            </div>
            </form>
        </div>
      </div>
     </div>
  </body>
